services:
  - type: web
    name: paypalych-webhook
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn webhook:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false  # Заполнишь вручную в dashboard
      - key: PAYPALYCH_SHOP_ID
        sync: false
      - key: PAYPALYCH_API_TOKEN
        sync: false
